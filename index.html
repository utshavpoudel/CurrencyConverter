<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>
    
<div class="container">
<h1>Currency Converter</h1>
<form>
    <div class="amount">
        <H3>Enter Amount</H3>
        <input value="" type="text">

        <div class="from-to">

            <div class="from">
                <h3>From</h3>


                <img id="fromFlag"src="https://flagsapi.com/US/flat/64.png"  />
                <select id="fromCurrency" name="from" >
                    
                    <option value="usd">USD</option>
                </select>
            </div>

            <div class="icon">
<i id="swapBtn" class="fa-solid fa-arrow-right-arrow-left"></i>
            </div>


            <div class="to">
                <h3>To</h3>
                <img id="toFlag" src="https://flagsapi.com/NP/flat/64.png"  />
                <select id="toCurrency" name="from" >
                    
                    <option value="nep">NEP</option>
                </select>
            </div>

        </div>


    </div>
</form>
</div>




<script src="names.js"></script>
<script src="comb.js"></script>
</body>
</html>
