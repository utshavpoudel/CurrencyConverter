<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div class="container">
<h1>Currency Converter</h1>
<form>
    <div class="amount">
        <p><H3>Enter Amount</H3></p>
        <input value="" type="text">

        <div class="from-to">

            <div class="from">
                <h3>From</h3>


                <img src="img src="https://flagsapi.com/US/flat/64.png"  />
                <select name="from" >
                    
                    <option value="usd">Usd</option>
                </select>
            </div>

            <div class="to">
                <h3>To</h3>
            </div>

        </div>


    </div>
</form>







</div>




<script src="names.js"></script>
<script src="comb.js"></script>
</body>
</html>
